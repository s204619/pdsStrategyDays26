<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDS Strategy Days 2026 — Participant List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f4f4f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    header {
      background: #fff;
      border-bottom: 3px solid #c0392b;
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #2c2c2c;
      letter-spacing: 0.02em;
    }

    header span {
      color: #c0392b;
      font-weight: 700;
    }

    .pages {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 48px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .page {
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
    }

    .page-cover {
      max-width: 420px;
      margin: 0 auto;
    }

    footer {
      text-align: center;
      padding: 16px;
      color: #aaa;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

  <header>
    <h1><span>PDS</span> Strategy Days 2026 &mdash; Participant List</h1>
  </header>

  <div class="pages">
    <div class="page page-cover">
      <img src="images/page-1.png" alt="Cover">
    </div>
    <div class="page"><img src="images/page-2.png" alt="Participants page 1"></div>
    <div class="page"><img src="images/page-3.png" alt="Participants page 2"></div>
    <div class="page"><img src="images/page-4.png" alt="Participants page 3"></div>
    <div class="page"><img src="images/page-5.png" alt="Participants page 4"></div>
    <div class="page"><img src="images/page-6.png" alt="Participants page 5"></div>
    <div class="page"><img src="images/page-7.png" alt="Participants page 6"></div>
    <div class="page"><img src="images/page-8.png" alt="Participants page 7"></div>
    <div class="page"><img src="images/page-9.png" alt="Participants page 8"></div>
  </div>

  <footer>PDS Strategy Days 2026 &mdash; Lundbeck</footer>

</body>
</html>
